<article class="main-post card">
  <!-- CHẾ ĐỘ XEM (DETAIL) -->
  <ng-container *ngIf="!isEditing">
    <header class="post-header">
      <h1 class="post-title">{{ post.title }}</h1>
      <div class="post-meta">Đăng bởi: {{ post.author }}</div>
    </header>

    <div class="post-content ql-editor" [innerHTML]="post.content | safeHtml"></div>

    <!-- Link Preview tĩnh (không có nút X) -->
    <div class="post-attachment" *ngIf="post.linkPreview">
      <div class="horizontal-card">
         <img [src]="post.linkPreview.image" class="thumb" *ngIf="post.linkPreview.image">
         <div class="meta">
           <strong>{{ post.linkPreview.title }}</strong>
           <p>{{ post.linkPreview.description }}</p>
         </div>
      </div>
    </div>

    <footer class="post-actions" *ngIf="isAuthor">
      <button (click)="onEdit()" class="btn-edit">Sửa bài</button>
      <!--<button (click)="onDelete()" class="btn-delete">Xóa</button>-->
    </footer>
  </ng-container>
