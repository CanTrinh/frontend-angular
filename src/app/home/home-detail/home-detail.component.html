<div class="post-detail-wrapper">
  <!-- 1. PHẦN NỘI DUNG CHÍNH (Từ bài viết gốc) -->
  <article class="main-post card">
    <header class="post-header">
      <h1 class="post-title">{{ post.title }}</h1>
      <div class="post-meta">Đăng bởi: {{ post.author.name }} • {{ post.createdAt | date:'dd/MM/yyyy' }}</div>
    </header>

    <!-- HIỂN THỊ NỘI DUNG TỪ QUILL (Quan trọng nhất) -->
    <!-- Phải có class ql-editor để các format bold, image, video từ Quill hiển thị đúng -->
    <div class="post-content ql-editor" [innerHTML]="post.content | safeHtml"></div>

    <!-- 2. HIỂN THỊ LINK PREVIEW / YOUTUBE (Nếu có trong DB) -->
    <!-- Bạn cần lưu data linkPreview vào DB cùng lúc với bài viết -->
    <div class="post-attachment" *ngIf="post.linkPreview">
      
      <!-- Nếu là YouTube: Nhúng Iframe thật để người dùng xem luôn -->
      <div *ngIf="post.linkPreview.isYoutube" class="youtube-embed">
        <iframe 
          [src]="post.linkPreview.url | safeHtml" 
          frameborder="0" 
          allowfullscreen>
        </iframe>
      </div>

      <!-- Nếu là Link báo chí: Hiện Card tĩnh (không có nút X vì đây là trang View) -->
      <div class="horizontal-card" *ngIf="!post.linkPreview.isYoutube">
        <img [src]="post.linkPreview.image" *ngIf="post.linkPreview.image" class="thumb">
        <div class="meta">
          <a [href]="post.linkPreview.url" target="_blank">
            <strong>{{ post.linkPreview.title }}</strong>
          </a>
          <p>{{ post.linkPreview.description }}</p>
        </div>
      </div>
    </div>

    <!-- 3. CỤM NÚT ĐIỀU KHIỂN (Sửa/Xóa) -->
    <!--<footer class="post-actions" *ngIf="isAuthor">
      <button (click)="onEdit()" class="btn-edit">Chỉnh sửa bài viết</button>
      <button (click)="onDelete()" class="btn-delete">Xóa bài</button>
    </footer>-->
  </article>

  <!-- 4. PHẦN BÌNH LUẬN & QUICK REPLY -->
  <section class="comment-section">
    <app-comments [postId]="post.id"></app-comments>
   <!-- <app-comment-list [postId]="post.id"></app-comment-list>-->

</div>
