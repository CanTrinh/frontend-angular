<div class="post-form post-detail-view"> <!-- Dùng lại class post-form để giữ style khung -->
  <fieldset>
    <!-- Header: Tiêu đề và Nút điều khiển -->
    <div class="detail-header">
      <legend *ngIf="!isEditing">{{ post.title }}</legend>
      <div class="post-controls">
        <button type="button" class="btn-icon" (click)="toggleEdit()" title="Chỉnh sửa">✏️</button>
        <button type="button" class="btn-icon btn-del" (click)="onDelete(post.id)" title="Xóa">🗑️</button>
      </div>
    </div>

    <!-- CHẾ ĐỘ XEM (View Mode) -->
    <ng-container *ngIf="!isEditing">
      <div class="form-group readonly-editor">
        <!-- Đưa nội dung vào khung có style y hệt Quill nhưng không có toolbar -->
        <div class="ql-container ql-snow">
          <div class="ql-editor" [innerHTML]="post.content | safeHtml"></div>
        </div>
      </div>

      <!-- Hiển thị Link Preview y hệt lúc tạo -->
      <div class="link-preview-container" *ngIf="post.linkPreview">
        <div class="preview-card-wrapper">
          <div class="horizontal-card">
            <img [src]="post.linkPreview.image" *ngIf="post.linkPreview.image" class="thumb">
            <div class="meta">
              <strong>{{ post.linkPreview.title }}</strong>
              <p>{{ post.linkPreview.description }}</p>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- CHẾ ĐỘ SỬA (Edit Mode) -->
    <form [formGroup]="postForm" (ngSubmit)="onUpdate()" *ngIf="isOwner(post) && isEditing">
      <div class="form-group">
        <label>Title</label>
        <input type="text" formControlName="title" />
      </div>

      <div class="form-group">
        <app-rich-text-editor
          [content]="initialContent"
          (contentChange)="handleEditorChange($event)">
        </app-rich-text-editor>
      </div>

      <footer class="form-actions">
        <button type="button" (click)="toggleEdit()">Cancel</button>
        <button type="submit" class="btn-update">Update Post</button>
      </footer>
    </form>

  </fieldset>
</div>
