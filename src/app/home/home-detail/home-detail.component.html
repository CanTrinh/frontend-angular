<!-- post-detail.component.html -->
<div class="post-detail" *ngIf="post">
  <h3>{{post.title}}</h3>
  <!-- 1. Hiển thị Nội dung chữ (Luôn hiện nếu có) -->
  <p class="content" *ngIf="post.content">{{ post.content }}</p>

  <div class="media-content">
    
    <!-- 2. Hiển thị danh sách MEDIA từ S3 (Ảnh/Video upload trực tiếp) -->
    <div *ngIf="post.media?.length > 0" class="media-grid">
      <div *ngFor="let item of post.media" class="grid-item">
        <img *ngIf="item.type === 'IMAGE'" 
             [src]="cloudFrontUrl + '/' + item.url" 
             class="full-img" 
             crossorigin="anonymous">
        
      <video *ngIf="item.type === 'VIDEO'" 
       controls 
       playsinline 
       class="post-video"
       crossorigin="anonymous">
      <source [src]="cloudFrontUrl + '/' + item.url" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ phát video.
      </video>

      </div>
    </div>

    <!-- 3. Hiển thị YouTube (Nếu có URL) -->
    <div *ngIf="safeYoutubeUrl" class="video-box" [class.is-shorts]="isShorts">
      <iframe [src]="safeYoutubeUrl" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- 4. Hiển thị Link báo/Metadata (Nếu có metadata) -->
    <div *ngIf="post.metadata" class="link-card">
      <a [href]="post.mediaUrl" target="_blank" rel="noopener noreferrer">
        <img [src]="post.metadata.image" *ngIf="post.metadata.image" class="thumb">
        <div class="info">
          <h3>{{ post.metadata.title }}</h3>
          <p>{{ post.metadata.description }}</p>
        </div>
      </a>
    </div>

    <!-- 5. Hiển thị Ảnh đơn (Nếu có link cũ) 
    <img *ngIf="post.mediaUrl" [src]="post.mediaUrl" class="full-img">-->

  </div>
  <app-comments [postId]="post.id"></app-comments>
</div>
