<!-- CHẾ ĐỘ 1: DÀNH CHO BÀI VIẾT (POST) -->
<div *ngIf="mode === 'post'" class="reaction-container post-mode">
  <div class="reaction-menu" *ngIf="isLogin">
    <div *ngFor="let icon of reactionIcons" class="icon-wrapper" (click)="onSelect(icon.type)">
      <img [src]="icon.url" [alt]="icon.label" />
      <span class="tooltip">{{ icon.label }}</span>
    </div>
  </div>

  <button class="main-button" [disabled]="!isLogin" (click)="onMainButtonClick()">
    <img *ngIf="currentUserReaction?.iconUrl" [src]="currentUserReaction?.iconUrl" class="current-icon" />
    <span [class.active]="currentUserReaction">{{ currentUserReaction ? currentUserReaction.type : 'Thích' }}</span>
  </button>
</div>


<!-- CHẾ ĐỘ 2: DÀNH CHO TIN NHẮN (MESSAGE) - THANH TOOLBAR MESSENGER -->
<div *ngIf="mode === 'message' || mode === 'comment' " class="message-toolbar-container">
  
  <!-- Nhóm 1: Nút Reaction ẩn menu -->
  <div class="toolbar-item reaction-trigger">
    <!-- Icon mặt cười kích hoạt -->
    <button class="toolbar-btn" title="Bày tỏ cảm xúc">😀</button>
    
    <!-- Menu bay lên khi hover vào chính nút reaction-trigger này -->
    <div class="reaction-menu grid-menu">
      <div *ngFor="let icon of reactionIcons" class="icon-wrapper" (click)="onSelect(icon.type)">
        <img [src]="icon.url" [alt]="icon.label" />
        <span class="tooltip">{{ icon.label }}</span>
      </div>
    </div>
  </div>

  <!-- Nhóm 2: Nút Trả lời (Reply) -->
  <div class="toolbar-item">
    <button class="toolbar-btn" (click)="replyClicked.emit()" title="Trả lời">
      <!-- Icon reply hoặc text mẫu -->
      ↩️
    </button>
  </div>

  <!-- Nhóm 3: Nút Xem thêm (More) -->
  <div class="toolbar-item">
    <button class="toolbar-btn" (click)="moreClicked.emit()" title="Xem thêm">
      💬
    </button>
  </div>

</div>
