
<form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="post-form">
  <fieldset>
    <legend>Create a Post</legend>
    
    <!-- Title -->
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" formControlName="title" placeholder="Enter post title" />
    </div>

     <div class="form-group">
        <!--
        <quill-editor 
          #editor
          formControlName="content" 
          [modules]="quillConfig"
          (onEditorCreated)="addDragAndDrop($event)"
          placeholder="Bạn đang nghĩ gì?">
        </quill-editor>
      -->

        <app-rich-text-editor
          [draftId]= "draftId"
          [content] = "postForm.get('content')?.value"
          (contentChange)= "handleEditorChange($event)"
          (linkDetected) = "fetchMetadata($event)"
        ></app-rich-text-editor>
    
    </div>

    <!-- Media URL -->
    <!--
    <div class="form-group">
      <label for="mediaUrl">Media URL</label>
      <input id="mediaUrl" type="text" formControlName="mediaUrl" placeholder="Link image/video/youtube" />
    </div>
  -->

     <!--

      -->

        <div *ngIf="item.type === 'video'" class="video-thumb">
          <video [src]="item.previewUrl" muted></video>
          <span class="video-badge">VIDEO</span>
        </div>
      </div>
    </div>-->



    <!-- PHẦN THÊM MỚI: LINK PREVIEW CARD -->
    <div *ngIf="isScanning" class="loading-text">🔍 Đang phân tích link...</div>
    
    <div class="link-preview-container" *ngIf="linkPreview">
      <div class="preview-card-wrapper">
        <button type="button" class="remove-preview" (click)="onRemovePreview()">×</button>
      
        <!-- Nếu là YouTube -->
        <div *ngIf="linkPreview.isYoutube" class="video-preview">
           <p>📺 Video YouTube đã sẵn sàng nhúng</p>
        </div>

        <!-- Card cho báo chí / link thường -->
        <div class="horizontal-card">
          <img [src]="linkPreview.image" *ngIf="linkPreview.image" class="thumb">
          <div class="meta">
            <strong>{{ linkPreview.title }}</strong>
            <p>{{ linkPreview.description }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <footer class="form-actions">
      <button type="submit" [disabled]="postForm.invalid || isUploading">
        {{ isUploading ? 'Uploading...' : 'Publish' }}
      </button>
    </footer>
  </fieldset>
</form>
