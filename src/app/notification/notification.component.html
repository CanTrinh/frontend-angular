<!-- notification-bell.component.html -->
<div class="notification-container" (clickOutside)="isOpen = false">
  <!-- Biểu tượng chuông và Badge số lượng -->
  <div class="bell-icon" (click)="toggleDropdown()">
    <!--<i class="uil uil-bell"></i>-->
    <img class="bell" src="../../assets/img/bell-1.svg" alt="">
    <span class="badge"  *ngIf="(unseenCount$ | async) as count">{{ count > 9 ? '9+' : count }}</span>
  </div>

  <!-- Bảng danh sách thông báo -->
  <div class="noti-dropdown" *ngIf="isOpen">
    <div class="noti-header">
      <h3>Thông báo</h3>
      <button (click)="markAllRead()">Đọc tất cả</button>
    </div>

    <div class="noti-body" (scroll)="onScroll($event)">
      <div *ngIf="notifications.length === 0" class="empty">Không có thông báo nào</div>

      <div *ngFor="let noti of notifications" 
           [class.unread]="!noti.isRead" 
           class="noti-item"
           (click)="markAsRead(noti)">
        
        <div [ngSwitch]="noti.type">
          <!-- Giao diện Lời mời kết bạn -->
          <div *ngSwitchCase="'FRIEND_REQUEST'" class="noti-content">
            <app-avatar [imageUrl]="noti.sender.profilePic" 
            [firstLetter]="noti.sender.name?.slice(0,1)"
            [status]="noti.sender.id | userStatusPipe | async" 
            [size]="25">
            </app-avatar>
            <img [src]="noti.metadata.thumbnailUrl" class="avatar-small">
            <div class="text">
              <p>{{ noti.content }}</p>
              <div class="actions" *ngIf="!noti.metadata.isProcessed">
                <button class="btn-accept" (click)="handleFriend(noti, 'ACCEPTED', $event)">Chấp nhận</button>
                <button class="btn-reject" (click)="handleFriend(noti, 'REJECTED', $event)">Từ chối</button>
              </div>
              <span class="processed-text" *ngIf="noti.metadata.isProcessed">Đã xử lý</span>
            </div>
          </div>

          <!-- Giao diện Chấp nhận kết bạn -->
          <div *ngSwitchCase="'FRIEND_ACCEPT'" class="noti-content">
            <app-avatar [imageUrl]="noti.sender.profilePic" 
            [firstLetter]="noti.sender.name?.slice(0,1)"
            [status]="noti.sender.id | userStatusPipe | async" 
            [size]="25">
            </app-avatar>
            <img [src]="noti.metadata.thumbnailUrl" class="avatar-small">
            <div class="text">
              <p>{{ noti.content }}</p>
            </div>
          </div>

          <div *ngSwitchCase="'CHAT_1_1'" class="noti-content">
            <app-avatar [imageUrl]="noti.sender.profilePic" 
            [firstLetter]="noti.sender.name?.slice(0,1)"
            [status]="noti.sender.id | userStatusPipe | async" 
            [size]="25">
            </app-avatar>
            <img [src]="noti.metadata.thumbnailUrl" class="avatar-small">
            <div class="text">
              <p>{{ noti.content }}</p>
            </div>
          </div>
        </div>
        <span class="time">{{ noti.createdAt | date:'shortTime' }}</span>
      </div>
    </div>
  </div>
</div>
