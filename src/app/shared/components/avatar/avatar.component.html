<div class="avatar-wrapper" [ngClass]="status" [style.width.px]="size" [style.height.px]="size">
  <img [src]="imageUrl" [alt]="'avatar'" class="avatar-img">
  
  <!-- Icon chuông cho trạng thái danger -->
  <div class="status-badge" *ngIf="status === 'danger'">
    <span class="bell">🔔</span>
  </div>
</div>
