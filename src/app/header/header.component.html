<div class="logo">
  
        <img class="mylogo" src="../../assets/img/logoweb.svg" alt="">
        <p>CTlife</p>
        
        <img class="event" src="../../assets/img/world-cup-trophy.svg" alt="">

        <div class="match-box-container">
        <ng-container *ngFor="let match of matches; let i = index">
            <div class="match-card" *ngIf="i === currentIndex" [@slideAnimation]>    
                <!-- Tầng trên: 3 phần tử bọc lại cho dễ quản lý -->
                <div class="teams">
                    <img class="world-cup" [src]="'../../assets/img/world-cup/' + match.team1" [alt]="match.name1">
                    <span class="versus" *ngIf="!match.score1 && !match.score2"> - </span>
                    <span class="versus"*ngIf="match.score1 && match.score2">{{match.score1}}-{{match.score2}}</span>
                    <img class="world-cup" [src]="'../../assets/img/world-cup/' + match.team2" [alt]="match.name2">
                </div>
                <!-- Tầng dưới: Thời gian -->
                <span class="year"><strong>{{ match.time }}</strong></span>
            </div>
        </ng-container>
        </div>

   
</div>

<!--
    <div class="date-time">{{result}} {{today | date: 'dd/MM/yyyy'}} || {{tetDay}}</div>
-->
    <div class="date-time">
        <span class="dl">{{result}} {{today | date: 'dd/MM/yyyy'}}</span>
        <span class="al">{{tetDay}} âm lịch</span>
    </div>

    <div class="weather">
        <select id="town" name="town" (change)="onChangeValue($event)">
                <option *ngFor="let province of provinces" [value]="province.name">{{province.name}}</option>
        </select>
        <img [src]="icon" alt="" appIcon>
        <p class="temp">{{temp}}</p>
        <code>&deg;C</code>
    </div>
