<div class="chat-wrapper">
  
  <div class="search-box">
    
    <app-user-search></app-user-search>

    <app-group-creation></app-group-creation>

  </div>
  <!-- Cột trái: Danh sách phòng -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Room Chat</h3>
    </div>
    <div class="room-list">
      <div *ngFor="let room of rooms" 
           class="room-item" 
           [class.active]="activeRoom?.id === room.id"
           (click)="selectRoom(room)">
        <div class="avatar-container">
          <app-avatar [imageUrl]="apiCloudFront + room.profilePic" 
                [firstLetter]="room.name.slice(0,1)"
                [status]="room.idUser[0] | userStatusPipe | async" 
                [size]="20"
                *ngIf="room.type==='DIRECT'">
          </app-avatar>
    
          <app-avatar [imageUrl]="room.roomAvatar" 
                [firstLetter]="room.roomName.slice(0,1)"
                [status]="room.id | userStatusPipe | async" 
                [size]="20"
                *ngIf="room.type!=='DIRECT'">
          </app-avatar>
     
        </div>
        <div class="room-info">
          <span class="room-name" *ngIf="room.type==='DIRECT'">{{ room.name }}</span>
          <span class="room-name" *ngIf="room.type!=='DIRECT'">{{ room.roomName }}</span>
          <span class="last-msg text-truncate">{{ room.lastMessage }}</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Khu vực chính: Chat & Video -->
  <main class="chat-main">
    <header class="chat-header">
      <div class="header-user" *ngIf="activeRoom">
        <h4>{{ activeRoom.name }}</h4>
      </div>
      <div class="header-actions" *ngIf="activeRoom">
        <button class="btn-icon" (click)="startCall('VOICE')">📞</button>
        <button class="btn-call" (click)="startCall('VIDEO')">📹</button>
      </div>
    </header>

    <!-- Khu vực hiển thị Video khi đang gọi -->
    <section class="video-grid" *ngIf="isCalling">
      <div id="local-player" class="video-window">
        <span class="label">Bạn</span>
        <div class="call-controls">
          <!-- Nút điều khiển Micro -->
          <button (click)="onToggleMic()" [ngClass]="{'btn-active': videoService.isMicEnabled, 'btn-muted': !videoService.isMicEnabled}">
            <fa-icon [icon]="$any(videoService.isMicEnabled ? faMicro : faMicroSlash)"></fa-icon>
            <!--{{ videoService.isMicEnabled ? 'Tắt Mic' : 'Bật Mic' }}-->
          </button>

          <!-- Nút điều khiển Camera -->
          <button (click)="onToggleCam()" [ngClass]="{'btn-active': videoService.isCamEnabled, 'btn-muted': !videoService.isCamEnabled}">
            <fa-icon [icon]="$any(videoService.isCamEnabled ? faVideo : faVideoSlash)"></fa-icon>
            <!--{{ videoService.isCamEnabled ? 'Tắt Cam' : 'Bật Cam' }}-->
          </button>
        </div>

      </div>
      <div id="remote-player" class="video-window">
        <span class="label">Đối phương</span>
      </div>
      <button class="btn-hangup" (click)="endedCall()">Kết thúc</button>
    </section>

    <!-- Danh sách tin nhắn -->
    <section class="message-area" #scrollContainer>
      <div *ngFor="let m of messages" 
           class="message-row" 
           [class.me]="m.isMe">
        <div class="message-bubble">

          <app-avatar [imageUrl]="apiCloudFront + m.sender.profilePic" 
                [firstLetter]="m.sender.name.slice(0,1)"
                [status]="m.sender.id | userStatusPipe | async" 
                [size]="15"
                *ngIf="m.isMe === false">
          </app-avatar>
          <p>{{ m.content }}</p>
          <span class="message-time">{{ m.time | date:'HH:mm' }}</span>
        </div>
      </div>
    </section>

    <!-- Ô nhập tin nhắn -->
    <footer class="chat-footer">
      <input #msgInput 
             type="text" 
             placeholder="Nhập tin nhắn..." 
             (keyup.enter)="sendMessage(msgInput.value); msgInput.value=''">
      <button (click)="sendMessage(msgInput.value); msgInput.value=''">Send</button>
    </footer>
  </main>
</div>

<!-- Popup cuộc gọi đến -->
<div class="call-overlay" *ngIf="isCallComing">
  <div class="call-card">
    <div class="caller-info">
      <div class="pulse-ring"></div>
      <p>Cuộc gọi đến từ <strong>{{ incomingCallData.fromName }}</strong></p>
    </div>
    <div class="call-buttons">
      <button class="accept" (click)="acceptCall()">Chấp nhận</button>
      <button class="reject" (click)="rejectCall()">Từ chối</button>
    </div>
  </div>
</div>
