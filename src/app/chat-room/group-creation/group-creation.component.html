<div class="group-create-container">
  <h3>Tạo nhóm chat mới</h3>
  
  <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
    <!-- Ô nhập tên nhóm -->
    <div class="form-group">
      <input 
        type="text" 
        formControlName="roomName" 
        placeholder="Nhập tên nhóm chat..." 
        class="form-control"
      />
    </div>

    <!-- Danh sách bạn bè để tích chọn -->
    <div class="friend-selection-list">
      <label>Chọn thành viên vào nhóm:</label>
      
      <div class="friend-checkbox-item" *ngFor="let friend of friendsList; let i = index">
        <input 
          type="checkbox" 
          [id]="'friend-' + friend.friend.id"
          [checked]="isFriendSelected(friend.friend.id)"
          (change)="onCheckboxChange($event, friend.friend.id)"
        />
        <label [for]="'friend-' + friend.friend.id">
          <!--<img [src]="friend.avatar" class="avatar-sm" />-->
        <app-avatar [imageUrl]="friend.friend.profilePic" 
              [firstLetter]="friend.friend.name ?.slice(0,1)"
              [status]="friend.friend.id | userStatusPipe | async" 
              [size]="20">
        </app-avatar>
          <span>{{ friend.friend.name }}</span>
        </label>

      </div>
    </div>

    <!-- Các nút hành động -->
    <div class="form-actions">
      <button type="submit" [disabled]="groupForm.invalid || getSelectedUserIds().length === 0">
        🚀 Tạo Nhóm
      </button>
    </div>
  </form>
</div>
