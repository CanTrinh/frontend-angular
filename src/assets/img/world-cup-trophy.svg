    <defs>
        <!-- Dải màu vàng kim loại bóng đổ cho thân cúp -->
        <linearGradient id="worldCupGold" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4a3300" />    <!-- Bóng tối đậm -->
            <stop offset="15%" stop-color="#ab7a1e" />   <!-- Vàng đồng chuyển tiếp -->
            <stop offset="40%" stop-color="#fef1a2" />   <!-- Ánh sáng phản chiếu mạnh -->
            <stop offset="55%" stop-color="#cca033" />   <!-- Vàng gold tiêu chuẩn -->
            <stop offset="85%" stop-color="#ffd966" />   <!-- Ánh kim loại sáng -->
            <stop offset="100%" stop-color="#593e00" />  <!-- Bóng mờ viền cạnh -->
        </linearGradient>

        <!-- Dải màu xanh ngọc lục bảo cho 2 vòng đá Malachite ở đế cúp -->
        <linearGradient id="malachiteGreen" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#262f0a" />    <!-- Xanh rêu đậm -->
            <stop offset="50%" stop-color="#e7be1a" />   <!-- Xanh ngọc lục bảo sáng -->
            <stop offset="100%" stop-color="#051a10" />  <!-- Xanh đen -->
        </linearGradient>
    </defs>

</svg>